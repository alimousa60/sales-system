services:
  - type: web
    name: sales-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: CORS_ORIGIN
        value: "*"
      - key: USE_MEMORY_DB
        value: "false"
